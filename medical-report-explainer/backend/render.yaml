services:
  - type: web
    name: medical-report-explainer-api
    runtime: docker
    plan: free
    dockerContext: medical-report-explainer/backend
    dockerfilePath: medical-report-explainer/backend/Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: VECTOR_DB_PATH
        value: /data/vector_store
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: AUTH_DB_PATH
        value: /data/auth.db
      - key: AUTH_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://medical-report-explainer-ai.vercel.app
